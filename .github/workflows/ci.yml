# Ream CI — Rust tests + TypeScript tests + NAPI cross-platform build
# @implements FR83

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all

  typescript:
    name: TypeScript (lint + test)
    runs-on: ubuntu-latest
    needs: [rust]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build NAPI binaries so TS tests can import native modules
      - run: pnpm exec napi build --release
        working-directory: crates/ream-bus-napi
      - run: pnpm exec napi build --release
        working-directory: crates/ream-http-napi
      - run: pnpm exec biome check packages/
      - run: pnpm exec vitest run

  napi-build:
    name: NAPI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [rust, typescript]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec napi build --release --target ${{ matrix.target }}
        working-directory: crates/ream-bus-napi
      - run: pnpm exec napi build --release --target ${{ matrix.target }}
        working-directory: crates/ream-http-napi
      - uses: actions/upload-artifact@v4
        with:
          name: napi-${{ matrix.target }}
          path: |
            packages/**/*.node
            crates/**/*.node
